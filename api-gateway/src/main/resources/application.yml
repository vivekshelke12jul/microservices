server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/auth/**

            - id: article-service
              uri: lb://article-service
              predicates:
                - Path=/articles/**

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: aquickbrownfoxjumpsoverthelazydogaquickbrownfoxjumpsoverthelazydog

logging:
  level:
    org.springframework.cloud.gateway: trace
    org.springframework.cloud.loadbalancer: trace
    org.springframework.cloud.loadbalancer.reactive: trace
    org.springframework.security: trace
    org.springframework.web: trace